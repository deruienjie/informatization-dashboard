<style>
:root {
  --g:#10b981;--g-bg:#d1fae5;--g-d:#065f46;
  --y:#f59e0b;--y-bg:#fef3c7;--y-d:#92400e;
  --b:#3b82f6;--b-bg:#dbeafe;--b-d:#1e40af;
  --r:#ef4444;--r-bg:#fee2e2;--r-d:#991b1b;
  --p:#8b5cf6;--p-bg:#ede9fe;--p-d:#5b21b6;
  --or:#f97316;--or-bg:#fff3e0;
  --s-50:#f8fafc;--s-100:#f1f5f9;--s-200:#e2e8f0;--s-400:#94a3b8;--s-600:#475569;--s-700:#334155;--s-800:#1e293b;--s-900:#0f172a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;background:var(--s-50);color:var(--s-700);min-height:100vh}
.container{max-width:1000px;margin:0 auto;padding:16px 20px}

.header{background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);border-radius:16px;padding:20px 28px;color:#fff;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;top:-50%;right:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(139,92,246,.15),transparent 70%);border-radius:50%}
.header-left{position:relative;z-index:1}
.header h1{font-size:20px;font-weight:700}
.header .sub{font-size:12px;color:#94a3b8;margin-top:3px}
.header-nav{display:flex;gap:6px;position:relative;z-index:1;flex-wrap:wrap}
.header-nav a{font-size:11px;padding:5px 12px;border-radius:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#cbd5e1;text-decoration:none;transition:all .2s;white-space:nowrap}
.header-nav a:hover,.header-nav a.active{background:rgba(139,92,246,.2);border-color:rgba(139,92,246,.4);color:#fff}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;background:#fff;border-radius:12px;padding:6px;border:1px solid var(--s-200)}
.tab{padding:8px 16px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--s-600);transition:.2s;white-space:nowrap}
.tab:hover{background:var(--s-100)}
.tab.active{background:var(--p);color:#fff}

/* Flow content */
.tab-content{display:none}
.tab-content.active{display:block}

/* Flow stages */
.flow-stages{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.flow-stage{padding:8px 12px;border-radius:8px;border:1px solid var(--s-200);background:#fff;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;transition:.2s;min-width:fit-content}
.flow-stage:hover{background:var(--s-100)}
.flow-stage.active{border-color:var(--p);background:var(--p-bg);color:var(--p-d)}
.flow-stage .num{font-size:9px;color:var(--s-400);display:block}

/* Steps */
.step-card{background:#fff;border-radius:10px;border:1px solid var(--s-200);padding:14px 18px;margin-bottom:8px;transition:.2s}
.step-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.04)}
.step-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.step-code{font-size:10px;color:var(--s-400);font-weight:600;background:var(--s-100);padding:3px 8px;border-radius:6px}
.step-task{font-size:13px;font-weight:700;color:var(--s-800)}
.step-detail{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;line-height:1.6}
.step-field{display:flex;flex-direction:column;padding:4px 8px;background:var(--s-50);border-radius:5px}
.step-field-label{font-size:9px;color:var(--s-400);font-weight:600}
.step-field-value{color:var(--s-700);font-size:11px}
.step-redline{background:var(--r-bg);border-left:3px solid var(--r);padding:6px 10px;border-radius:4px;font-size:10px;margin-top:8px;color:var(--r-d);font-weight:600}

/* Summary card */
.summary-card{background:#fff;border-radius:12px;border:1px solid var(--s-200);padding:18px 22px;margin-bottom:12px}
.summary-title{font-size:14px;font-weight:700;color:var(--s-800);margin-bottom:6px}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.summary-item{font-size:12px;text-align:center;padding:10px;background:var(--s-50);border-radius:8px}
.summary-val{font-size:20px;font-weight:700}
.summary-label{font-size:10px;color:var(--s-400);margin-top:2px}

.breadcrumb{display:flex;gap:6px;align-items:center;font-size:11px;color:var(--s-400);padding:12px 0;border-top:1px solid var(--s-200);margin-top:16px}
.breadcrumb a{color:var(--b);text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}

/* ===== 统一顶部导航 V2（5 板块 · 30px 大桥接 hover） ===== */
.topnav {
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  border-radius: 14px;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 0 auto 24px auto;
  max-width: 1000px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  position: relative;
  z-index: 100;
}
.topnav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: #fff;
  font-weight: 600;
  font-size: 15px;
}
.topnav-brand .logo {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #10b981, #06b6d4);
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 16px;
}
.topnav-menu {
  display: flex;
  gap: 6px;
  align-items: center;
}
.topnav-item {
  position: relative;
  padding: 8px 14px;
  border-radius: 8px;
  color: #cbd5e1;
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: all .2s;
  user-select: none;
  line-height: 1;
}
.topnav-item:hover, .topnav-item.active {
  background: rgba(16,185,129,0.2);
  color: #fff;
}
.topnav-item .tn-icon { font-size: 14px; opacity: 0.9; line-height: 1; vertical-align: middle; }
.topnav-item .tn-arrow { font-size: 9px; opacity: 0.6; line-height: 1; vertical-align: middle; }
.topnav-badge {
  background: #ef4444;
  color: #fff;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 8px;
  margin-left: 4px;
  font-weight: 600;
}

/* ── Dropdown ── */
.topnav-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  min-width: 220px;
  background: #1e293b;
  border-radius: 10px;
  padding: 8px;
  border: 1px solid #334155;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  z-index: 200;
}

/* 30px 透明 hover 桥接 — 保证鼠标从菜单项移到下拉时 hover 链连续 */
.topnav-item.has-dropdown::after {
  content: '';
  position: absolute;
  top: 100%;
  left: -8px;
  right: -8px;
  height: 30px;
  background: transparent;
  z-index: 190;
}
.topnav-item.has-dropdown:hover .topnav-dropdown {
  display: block;
}

/* 右侧对齐下拉（末尾菜单如"知识沉淀"/"我"） */
.topnav-item.has-dropdown-right .topnav-dropdown {
  left: auto;
  right: 0;
}
.topnav-item.has-dropdown-right::after {
  left: auto;
  right: -8px;
}

/* Dropdown 内部 */
.topnav-dropdown a {
  display: block;
  padding: 7px 10px;
  font-size: 12px;
  color: #cbd5e1;
  text-decoration: none;
  border-radius: 5px;
  white-space: nowrap;
}
.topnav-dropdown a:hover {
  background: rgba(16,185,129,0.15);
  color: #34d399;
}
.topnav-dropdown .divider {
  height: 1px;
  background: #334155;
  margin: 6px 4px;
}
.topnav-dropdown .tn-section {
  padding: 6px 12px 4px;
  font-size: 11px;
  color: #64748b;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

@media (max-width: 768px) {
  .topnav-menu { flex-wrap: wrap; }
}
</style>

function renderFlow(key) {
  const flow = flows[key];
  let stagesHtml = '', stepsHtml = '';
  flow.stages.forEach((stage,si) => {
    stagesHtml += `<div class="flow-stage" onclick="scrollStage('${key}','${stage.id}')" id="stg-${key}-${si}">
      <span class="num">${si+1}</span>${stage.name}
    </div>`;
    stepsHtml += `<div id="stg-content-${key}-${si}"><div style="font-size:14px;font-weight:700;color:var(--s-800);margin-bottom:6px">${stage.name}（${stage.steps.length}个节点）</div>`;
    stage.steps.forEach(s=>{
      stepsHtml += `<div class="step-card">
        
        <div class="step-detail">
          <div class="step-field"><span class="step-field-label">责任部门</span><span class="step-field-value">${s.dept}</span></div>
          <div class="step-field"><span class="step-field-label">关键输出</span><span class="step-field-value">${s.output}</span></div>
        </div>`;
      if(s.redline) stepsHtml += `<div class="step-redline">🚫 ${s.redline}</div>`;
      stepsHtml += `</div>`;
    });
    stepsHtml += `</div>`;
  });
  document.getElementById('stages-'+key).innerHTML = stagesHtml;
  document.getElementById('steps-'+key).innerHTML = stepsHtml;
}

['auto','std','custom','testrd','sw','sc'].forEach(k => renderFlow(k));

function switchTab(key) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+key).classList.add('active');
  document.querySelectorAll(`.tab`).forEach(t=>{if(t.textContent.includes(key==='auto'?'自动化':key==='std'?'标准':key==='custom'?'定制':key==='testrd'?'测试研发':key==='sw'?'软件':key==='sc'?'供应链':'')) t.classList.add('active')});
}

function scrollStage(key,id) {
  const el = document.getElementById(`stg-content-${key}-${flows[key].stages.findIndex(s=>s.id===id)}`);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
